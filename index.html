<!DOCTYPE html>

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;

        html {
            font-size: calc(100vw / 375 * 16); /* 以375px设计稿为基准，适配不同屏幕 */
        }
        body {
            background-color: #f7f9fc;
            color: #333;
            padding: 0.8rem;
            max-width: 600px;
            margin: 0 auto;
            min-height: 100vh;
        }
        .container {
            background: #fff;
            border-radius: 1.5rem;
            padding: 2rem;
            box-shadow: 0 0.5rem 1.875rem rgba(0,0,0,0.04);
            margin-bottom: 0.8rem;
            width: 100%;
        }
        .question-page { display: block; }
        .result-page { display: none; }

        /* 进度条 */
        .progress {
            height: 0.375rem;
            background: #f0f4f8;
            border-radius: 0.1875rem;
            margin-bottom: 1.5rem;
            overflow: hidden;
            width: 100%;
        }
        .progress-bar {
            height: 100%;
            background: #94d2e2;
            width: 0%;
            transition: width 0.3s ease;
        }

        /* 题目 */
        .question-title {
            font-size: 1.25rem;
            font-weight: 500;
            margin-bottom: 1.75rem;
            color: #2c3e50;
            text-align: center;
            line-height: 1.5;
            word-break: break-word;
        }

        /* 选项 */
        .options {
            display: flex;
            flex-direction: column;
            gap: 0.875rem;
            width: 100%;
        }
        .option {
            padding: 1rem 1.25rem;
            background: #f9fbfd;
            border-radius: 0.875rem;
            border: 2px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
            touch-action: manipulation; /* 优化移动端触摸 */
            word-break: break-word;
        }
        .option:hover {
            background: #f2f7fb;
        }
        .option.selected {
            border-color: #94d2e2;
            background: #eef7fc;
            color: #3a9ccf;
        }

        /* 按钮 */
        .btn-group {
            display: flex;
            justify-content: space-between;
            margin-top: 1.875rem;
            width: 100%;
        }
        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 0.75rem;
            background: #94d2e2;
            color: #fff;
            font-size: 1rem;
            cursor: pointer;
            touch-action: manipulation;
            min-width: 45%; /* 保证按钮最小宽度 */
        }
        .btn:disabled {
            background: #e1e8ed;
            cursor: not-allowed;
        }
        .next-btn {
            background: #76d3c6;
        }

        /* 结果页 */
        .result-title {
            font-size: 1.5rem;
            font-weight: 600;
            text-align: center;
            color: #2c3e50;
            margin-bottom: 0.625rem;
            word-break: break-word;
        }
        .result-sub {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 1.25rem;
            font-size: 0.9375rem;
        }

            background: #f2f7fb;
            border-radius: 1.25rem;
            padding: 1.75rem 1.5rem;
            margin-bottom: 1.75rem;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.75rem;
            width: 100%;
        }
        .animal-name-big {
            font-size: 2.5rem; /* 响应式单位，小屏自动适配 */

            color: #3a9ccf;
            margin-bottom: 0.25rem;
            line-height: 1;

            font-size: 1.5rem;
            color: #76d3c6;
            margin-bottom: 0.5rem;
            font-weight: 600;

            font-size: 1rem;
            color: #555;
            line-height: 1.6;
            max-width: 100%;
            word-break: break-word;
            padding: 0 0.5rem;

        .profile {
            display: flex;
            justify-content: space-between;
            margin-bottom: 2rem;
            text-align: center;
            width: 100%;
            padding: 0 0.5rem;
        }
        .profile-item {
            width: 23%;
        }
        .profile-value {
            font-size: 1.125rem;
            font-weight: 600;
            color: #555;
        }
        .profile-label {
            font-size: 0.75rem;
            color: #999;
            margin-top: 0.25rem;

            background: #f2f7fb;
            border: none;
            border-radius: 0.875rem;
            font-size: 1rem;
            color: #3a9ccf;

            background: #eef7fc;

            html {
                font-size: 14px;

                padding: 1.5rem;

                padding: 0;

        @media screen and (min-width: 428px) {
            html {
                font-size: 18px;
            }
        }
    </style>
</head>

let cur = 0;
let ans = {};
let sel = null;

// 加载题目
function load(i) {
    const q = qs[i];
    title.innerText = (i+1)+". "+q.t;
    const os = opts.querySelectorAll(".option");
    os[0].textContent = "A. "+q.o.A;
    os[1].textContent = "B. "+q.o.B;
    os[2].textContent = "C. "+q.o.C;
    os[3].textContent = "D. "+q.o.D;
    os.forEach(o=>o.classList.remove("selected"));
    sel = null;
    next.disabled = true;
    
    // 恢复已选答案
    if (ans[i]) {
        const t = [...os].find(x=>x.dataset.v===ans[i]);
        if (t) { 
            t.classList.add("selected"); 
            sel = ans[i]; 
            next.disabled = false; 
        }
    }
    
    // 控制上一题按钮状态
    prev.disabled = i === 0;
    // 更新进度条
    bar.style.width = ((i+1)/qs.length*100)+"%";
}

// 选择选项
function s(el) {
    opts.querySelectorAll(".option").forEach(o=>o.classList.remove("selected"));
    el.classList.add("selected");
    sel = el.dataset.v;
    next.disabled = false;
}

// 上一题
function p() { 
    if(cur > 0) {
        ans[cur] = sel;
        cur--;
        load(cur);
    }
}

// 下一题/提交
function n() { 
    ans[cur] = sel; 
    if(cur === qs.length - 1) {
        calc();
        return;
    }
    cur++; 
    load(cur); 
}

// 核心计算逻辑（单结果+保底60%以上）
function calc() {
    // 1. 计算各维度得分
    const count = {A:0, B:0, C:0, D:0};
    const totalQuestions = qs.length;
    
    // 统计每个维度的选择次数（兜底处理，防止未选）
    for(let i = 0; i < totalQuestions; i++) {
        const val = ans[i] || "A";
        count[val]++;
    }
    
    // 计算百分比
    const scores = {
        A: Math.round((count.A / totalQuestions) * 100),
        B: Math.round((count.B / totalQuestions) * 100),
        C: Math.round((count.C / totalQuestions) * 100),
        D: Math.round((count.D / totalQuestions) * 100)
    };

    // 更新性格维度显示
    document.getElementById("pA").innerText = scores.A + "%";
    document.getElementById("pB").innerText = scores.B + "%";
    document.getElementById("pC").innerText = scores.C + "%";
    document.getElementById("pD").innerText = scores.D + "%";

    // 2. 找到最高维度
    let maxType = "A";
    let maxScore = scores.A;
    for(const type of ["B", "C", "D"]) {
        if(scores[type] > maxScore) {
            maxScore = scores[type];
            maxType = type;
        }
    }

    // 3. 从最高维度中随机选一个动物
    const typeAnimals = animals[maxType];
    const randomIndex = Math.floor(Math.random() * typeAnimals.length);
    const selectedAnimal = typeAnimals[randomIndex];

    // 4. 生成60-98%之间的匹配度（保证>60%）
    const matchScore = 60 + Math.floor(Math.random() * 39); // 60-98随机数

    // 5. 渲染核心动物结果（已移除图片）
    const mainAnimalEl = document.getElementById("mainAnimal");
    mainAnimalEl.innerHTML = `
        <div class="animal-name-big">${selectedAnimal.n}</div>
        <div class="animal-score-big">${matchScore}%</div>
        <div class="animal-desc-big">${selectedAnimal.d}</div>
    `;

    // 显示结果页，隐藏答题页
    document.getElementById("questionBox").style.display = "none";
    document.getElementById("resultBox").style.display = "block";
}

// 重新测试
function restart() {
    cur = 0;
    ans = {};
    sel = null;
    document.getElementById("resultBox").style.display = "none";
    document.getElementById("questionBox").style.display = "block";
    load(0);
}

// 页面加载初始化
window.addEventListener("load", () => {
    load(0);
});
</script>
